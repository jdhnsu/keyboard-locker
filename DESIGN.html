<script>
    function toggleKey(btn) {
        if(btn.classList.contains('bg-error')) {
            // Switch to Allowed
            btn.classList.remove('bg-error', 'text-on-error', 'border-error-container');
            btn.classList.add('bg-green-600', 'text-white', 'border-green-800');
        } else {
            // Switch to Blocked
            btn.classList.remove('bg-green-600', 'text-white', 'border-green-800');
            btn.classList.add('bg-error', 'text-on-error', 'border-error-container');
        }
    }

    function toggleMainStatus(element) {
        const toggleDot = element.querySelector('.inline-block');
        const bgContainer = element.querySelector('.relative.inline-flex');
        const statusText = document.getElementById('engine-status');
        const isLocked = toggleDot.classList.contains('translate-x-7');
        
        if (isLocked) {
            // Switch to Inactive
            toggleDot.classList.remove('translate-x-7');
            toggleDot.classList.add('translate-x-1');
            bgContainer.classList.remove('bg-primary');
            bgContainer.classList.add('bg-outline-variant');
            
            statusText.textContent = '已关闭';
            statusText.classList.remove('text-on-surface');
            statusText.classList.add('text-on-surface-variant');
        } else {
            // Switch to Active
            toggleDot.classList.remove('translate-x-1');
            toggleDot.classList.add('translate-x-7');
            bgContainer.classList.remove('bg-outline-variant');
            bgContainer.classList.add('bg-primary');
            
            statusText.textContent = '已开启';
            statusText.classList.remove('text-on-surface-variant');
            statusText.classList.add('text-on-surface');
        }
    }
</script>
